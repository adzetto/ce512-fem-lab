name: Bug report
description: Report a reproducible package or solver issue
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest script, mesh, or benchmark case that reproduces the issue.
      placeholder: |
        import femlabpy as fp
        ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Python version, operating system, and install method.
      placeholder: "Python 3.12, Windows 11, pip install femlabpy"
